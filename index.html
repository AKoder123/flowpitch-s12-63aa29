<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark light">
  <title>FlowPitch</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Aurora background layers -->
  <div class="bgLayer bg0" aria-hidden="true"></div>
  <div class="bgLayer bg1" aria-hidden="true"></div>
  <div class="bgLayer grain" aria-hidden="true"></div>

  <!-- Navbar -->
  <header id="topNav" class="nav">
    <div class="navInner">
      <div class="brand">
        <span class="logoDot" aria-hidden="true"></span>
        <span id="deckTitle" class="brandTitle">Loading…</span>
      </div>
      <div class="navActions">
        <button id="prevBtn" class="btn ghost" type="button" aria-label="Previous slide">Prev</button>
        <button id="nextBtn" class="btn primary" type="button" aria-label="Next slide">Next</button>
        <button id="exportPdfBtn" class="btn outline" type="button">Export PDF</button>
      </div>
    </div>
  </header>

  <!-- Top progress bar -->
  <div id="topProgress" aria-hidden="true"><div id="topProgressBar"></div></div>

  <!-- Side dots navigation -->
  <nav id="sideDots" aria-label="Slide progress"></nav>

  <!-- Slides container -->
  <main id="slides" class="deck" aria-live="polite"></main>

  <!-- Off-screen capture stage for PDF export -->
  <div id="pdfStage" aria-hidden="true"></div>

  <noscript>
    <div class="nojs">This presentation requires JavaScript enabled.</div>
  </noscript>

  <script src="app.js"></script>
</body>
</html>
